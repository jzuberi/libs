- name: "describe workflow basic"
  prompt: "describe the workflow"
  expected:
    intent: "describe_workflow"
    must_include:
      - "Ingest Data"
      - "Transform Data"
      - "Export Data"
      - "ingest_data"
      - "transform_data"
      - "export_data"

- name: "workflow description includes dependencies"
  prompt: "describe workflow"
  expected:
    intent: "describe_workflow"
    must_include:
      - "Depends on"
      - "ingest_data"
      - "transform_data"
