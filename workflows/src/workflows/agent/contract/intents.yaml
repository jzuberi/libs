intents:

  list_workflow_items:
    description: "User wants to list recent items or runs in the workflow."
    parameters: {}

  describe_workflow:
    description: "User wants a human-readable explanation of the workflow"
    parameters: {}
    examples:
      - "describe the current workflow"


  create_item:
    description: "create a new workflow item."
    parameters: {}
    examples:
      - "let's create a new item"
      - "let's start a new workflow"

  # ------------------------------------------------------------------
  # PENDING-INTENT CLARIFICATION INTENTS
  # ------------------------------------------------------------------

  confirm_pending:
    description: "User is confirming the previously proposed action or item in a pending clarification."
    parameters: {}

  reject_pending:
    description: "User is rejecting the previously proposed action or item and wants to choose another."
    parameters: {}

  cancel_pending:
    description: "User wants to cancel the pending action and return to normal conversation."
    parameters: {}

  idle:
    description: "Unclear or no actionable intent; agent should ask for clarification."
    parameters: {}
