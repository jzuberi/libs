intents:

  list_workflow_items:
    description: "User wants to list recent items or runs in the workflow."
    parameters: {}

  describe_workflow:
    description: "User wants a human-readable explanation of the workflow"
    parameters: {}
    examples:
      - "describe the current workflow"

  load_recent:
    description: "User wants to load the most recent item"
    parameters: {}
    examples:
      - "load the recent item"

  show_current_item:
    description: "User wants information on the current item"
    parameters: {}
    examples:
      - "get item info"
      - "item status"

  rewind_substate:
    description: "User wants to rewind item substate"
    parameters:
      target_substate:
        type: string
        required: true
    examples:
      - "let's rewind the item substate"
      - "move item state backward"


  create_item:
    description: "create a new workflow item."
    parameters: {}
    examples:
      - "let's create a new item"
      - "let's start it"
      - "run it"

  # ------------------------------------------------------------------
  # PENDING-INTENT CLARIFICATION INTENTS
  # ------------------------------------------------------------------

  idle:
    description: "Unclear or no actionable intent; agent should ask for clarification."
    parameters: {}
