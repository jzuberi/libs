intents:

  query_item:
    description: "User wants details about the current item: status, branch, substate, next action."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: false

  list_workflow_items:
    description: "User wants to list recent items in the workflow."
    parameters: {}

  run_next_step:
    description: "User wants the engine to run the next step for the current item."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true

  approve_substate:
    description: "User wants to approve the current item substate."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true

  export:
    description: "User wants to export the item (final output generation)."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true

  show_step_output:
    description: "User wants to see the output of a specific step."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true
      step_name:
        type: reference
        namespace: steps
        required: true

  edit_step_output:
    description: "User wants to edit the output of a specific step."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true
      step_name:
        type: reference
        namespace: steps
        required: true
      edit_text:
        type: text_block
        required: true

  list_step_outputs:
    description: "User wants to list all step outputs for the current item."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true

  show_schema:
    description: "User wants to see the schema for a specific step."
    parameters:
      step_name:
        type: reference
        namespace: steps
        required: true

  explain_schema:
    description: "User wants a human-readable explanation of a step's schema."
    parameters:
      step_name:
        type: reference
        namespace: steps
        required: true

  describe_workflow:
    description: "User wants a human-readable explanation of the workflow: steps, dependencies, and purpose."
    parameters: {}

  # ------------------------------------------------------------------
  # PENDING-INTENT CLARIFICATION INTENTS
  # ------------------------------------------------------------------

  confirm_pending:
    description: "User is confirming the previously proposed action or item in a pending clarification."
    parameters: {}

  reject_pending:
    description: "User is rejecting the previously proposed action or item and wants to choose another."
    parameters: {}

  cancel_pending:
    description: "User wants to cancel the pending action and return to normal conversation."
    parameters: {}

  provide_item_id:
    description: "User is specifying which item id to use for the pending action."
    parameters:
      item_id:
        type: reference
        namespace: items
        required: true

  query_current_item:
    description: "User is asking what the current or last active item is."
    parameters: {}

  idle:
    description: "Unclear or no actionable intent; agent should ask for clarification."
    parameters: {}
